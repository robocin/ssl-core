syntax = "proto2";

package protocols.behavior;

import "protocols/behavior/motion.proto";
import "protocols/common/peripheral_actuation.proto";

message Planning {
    optional DiscretizedPath discretized_path = 1;
    optional GoToPoint go_to_point = 2;
    optional RotateInPoint rotate_in_point = 3;
    optional RotateOnSelf rotate_on_self = 4;
    required common.PeripheralActuation peripheral_actuation = 5;
}
