jobs:
  get-changed-cpp-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get all cpp files
        id: get-all-cpp-files
        run: |
          echo "changed-cpp-files=$(find . -type f -name "*.h" -o -name "*.hh" -o -name "*.hpp" -o -name "*.hxx" -o -name "*.h++" -o -name "*.c" -o -name "*.cc" -o -name "*.cpp" -o -name "*.cxx" -o -name "*.c++" -o -name "*.ixx" -o -name "*.cppm" | sort -u)" >> $GITHUB_ENV

      #      - name: Get changed cpp files
      #        id: get-changed-cpp-files
      #        uses: tj-actions/changed-files@v42
      #        with:
      #          files: |
      #            **.h
      #            **.hh
      #            **.hpp
      #            **.hxx
      #            **.h++
      #            **.c
      #            **.cc
      #            **.cpp
      #            **.cxx
      #            **.c++
      #            **.ixx
      #            **.cppm

      #      - name: Export changed cpp files
      #        run: echo "changed-cpp-files=${{ steps.get-changed-cpp-files.outputs.all_changed_files }}" >> $GITHUB_ENV

      - name: Get projects
        id: get-projects
        run: |
          echo "projects=$(find . -type d -name ".devcontainer" -exec dirname {} \; | sort -u)" >> $GITHUB_ENV

      - name: Get affected projects
        id: get-affected-projects
        run: |
          result=""
          for project in ${{ env.projects }}; do
            for file in ${{ env.changed-cpp-files }}; do
              if [[ $file == $project* ]]; then
                result="$result $project"
                break
              fi
            done
          done
          echo "affected-projects=$result" >> $GITHUB_ENV

  echo-affected-projects:
    runs-on: ubuntu-latest
    needs: get-changed-cpp-files
    steps:
      - name: Echo affected projects
        run: |
          for project in ${{ env.affected-projects }}; do
            echo "Affected project: $project"
          done

